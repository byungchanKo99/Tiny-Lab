autonomy:
  mode: supervised
  max_iterations: 3
  allow_idea_mutation: false
  stop_on_target: false
  circuit_breaker:
    max_consecutive_failures: 3

intervention:
  checkpoint: between_phases
  timeout_seconds: 7200

states:
  - id: SCOPE_DEFINITION
    type: ai_session
    prompt: "prompts/review/scope.md"
    allowed_tools: [Read, Write]
    allowed_write_globs:
      - "research/{iter}/.scope.yaml"
    completion:
      artifact: "research/{iter}/.scope.yaml"
      required_fields:
        [research_questions, inclusion_criteria, exclusion_criteria]
    next: LITERATURE_SEARCH

  - id: LITERATURE_SEARCH
    type: ai_session
    prompt: "prompts/review/literature_search.md"
    allowed_tools: [WebSearch, WebFetch, Read, Write]
    allowed_write_globs:
      - "research/{iter}/.papers_collected.yaml"
    completion:
      artifact: "research/{iter}/.papers_collected.yaml"
      required_fields: [papers, total_found, after_screening]
    error:
      max_retries: 2
      on_exhaust: ask
    next: PAPER_ANALYSIS

  - id: PAPER_ANALYSIS
    type: ai_session
    prompt: "prompts/review/analysis.md"
    allowed_tools: [Read, Write]
    allowed_write_globs:
      - "research/{iter}/.paper_analysis.yaml"
    completion:
      artifact: "research/{iter}/.paper_analysis.yaml"
      required_fields: [themes, comparisons, gaps]
    next: TAXONOMY

  - id: TAXONOMY
    type: ai_session
    prompt: "prompts/review/taxonomy.md"
    allowed_tools: [Read, Write]
    allowed_write_globs:
      - "research/{iter}/.taxonomy.yaml"
    completion:
      artifact: "research/{iter}/.taxonomy.yaml"
      required_fields: [categories, classification_criteria]
    next: SYNTHESIS

  - id: SYNTHESIS
    type: ai_session
    prompt: "prompts/review/synthesis.md"
    allowed_tools: [Read, Write]
    allowed_write_globs:
      - "research/{iter}/review_draft.md"
    completion:
      artifact: "research/{iter}/review_draft.md"
    next: REFLECT

  - id: REFLECT
    type: ai_session
    prompt: "prompts/reflect.md"
    allowed_tools: [Read, Write]
    allowed_write_globs:
      - "research/{iter}/reflect.yaml"
    completion:
      artifact: "research/{iter}/reflect.yaml"
      required_fields: [decision, reason]
    next: REFLECT_DONE

  - id: REFLECT_DONE
    type: process
    condition:
      source: "{iter}/reflect.yaml"
      field: decision
    next:
      done: DONE
      more_search: LITERATURE_SEARCH
