schema_version: 2
name: my-experiment
description: "Describe your experiment here"

agent:
  provider: claude # claude | codex

# workdir: .              # Optional: working directory for commands

build:
  type: flag # flag | script | code

run:
  type: command # command | pipeline

evaluate:
  type: stdout_json # stdout_json | script | llm

baseline:
  command: "python3 train.py --epochs 10"

metric:
  name: metric_name
  source: stdout_json
  direction: minimize # minimize | maximize

levers:
  example_lever:
    flag: "--example"
    baseline: 1.0
    space: [0.5, 1.0, 2.0]

# calibration:
#   wall_clock_minutes: 5
#   max_total_seconds: 330

# optimize:
#   type: random          # grid|random|custom
#   time_budget: 300      # seconds per hypothesis (default: 300 = 5 min)
#   n_trials: 20          # max trials (default: 20)

# search_space:           # Per-approach parameter definitions
#   lightgbm:
#     num_leaves: {type: int, low: 20, high: 127}
#     learning_rate: {type: float, low: 0.01, high: 0.3, log: true}
#     n_estimators: {type: int, low: 50, high: 500}
#   xgboost:
#     max_depth: {type: int, low: 3, high: 15}
#     learning_rate: {type: float, low: 0.01, high: 0.3, log: true}
#   random_forest:
#     n_estimators: {type: int, low: 50, high: 500}
#     max_depth: {type: int, low: 3, high: 20}

rules:
  - "Change command-line flags only"
  - "Do not install packages"
