name: generate
description: "Hypothesis generation pipeline — research, think, prepare, summarize"

steps:
  - id: research
    description: "Search for relevant techniques and papers"
    prompt_template: prompts/generate/research.md
    tools: [WebSearch, WebFetch, Read]
    output_schema: schemas/step_research.json

  - id: think
    description: "Analyze results, reason deeply, generate hypotheses (merged analyze+diagnose+hypotheses)"
    prompt_template: prompts/generate/think.md
    tools: [Read, Write, Edit, Bash]
    requires: [research]
    output_schema: schemas/step_think.json

  - id: prepare
    description: "Ensure hypotheses are executable — install deps, add code, add flags, adjust optimizer"
    prompt_template: prompts/generate/prepare.md
    tools: [Read, Write, Edit, Bash]
    requires: [think]
    output_schema: schemas/step_prepare.json

  - id: summary
    description: "Write generation summary"
    prompt_template: prompts/generate/summary.md
    tools: [Read, Write]
    requires: [prepare, think]
    output_schema: schemas/generate_summary.json
