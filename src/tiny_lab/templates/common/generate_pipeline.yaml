name: generate
description: "Hypothesis generation pipeline — each step runs as a separate LLM call"

steps:
  - id: research
    description: "Search for relevant techniques and papers"
    prompt_template: prompts/generate/research.md
    tools: [WebSearch, WebFetch, Read]
    output_schema: schemas/step_research.json

  - id: analyze
    description: "Read ledger, queue, project and analyze results"
    prompt_template: prompts/generate/analyze.md
    tools: [Read, Bash]
    requires: [research]
    output_schema: schemas/step_analyze.json

  - id: diagnose
    description: "Classify research state (EXPLORING/REFINING/SATURATED/STUCK)"
    prompt_template: prompts/generate/diagnose.md
    requires: [analyze]
    output_schema: schemas/step_diagnose.json

  - id: hypotheses
    description: "Generate approach-based hypotheses"
    prompt_template: prompts/generate/hypotheses.md
    tools: [Read, Write, Edit]
    requires: [diagnose, analyze]
    output_schema: schemas/step_hypotheses.json

  - id: prepare
    description: "Ensure hypotheses are executable — install deps, add code, add flags"
    prompt_template: prompts/generate/prepare.md
    tools: [Read, Write, Edit, Bash]
    requires: [hypotheses]
    output_schema: schemas/step_prepare.json

  - id: summary
    description: "Write generation summary"
    prompt_template: prompts/generate/summary.md
    tools: [Read, Write]
    requires: [prepare, hypotheses, diagnose]
    output_schema: schemas/generate_summary.json
