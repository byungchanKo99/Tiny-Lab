name: mlx-tiny-lm
description: "Tiny language model experiments on Apple Silicon with MLX"

lane: tiny-gpu
workdir: examples/mlx

# Plugin types: build.type (flag|script|code), run.type (surface|command|pipeline), evaluate.type (stdout_json|script|llm)
build:
  type: flag

run:
  type: surface

evaluate:
  type: stdout_json

baseline:
  command: >-
    python3 train.py --steps 120 --eval-every 20
    --save-every 20 --checkpoint-out tiny_weights.bin
    --learning-rate 0.02 --dim 64 --batch-size 128
  eval_command: ane/eval_tiny.py

metric:
  name: best_val_bpb
  source: stdout_json
  direction: minimize

levers:
  learning_rate:
    flag: "--learning-rate"
    baseline: 0.02
    space: [0.01, 0.02, 0.03]
  dim:
    flag: "--dim"
    baseline: 64
    space: [32, 64, 96]
  batch_size:
    flag: "--batch-size"
    baseline: 128
    space: [64, 128, 256]
  steps:
    flag: "--steps"
    baseline: 120
    space: [60, 120, 200]

calibration:
  wall_clock_minutes: 5
  max_total_seconds: 330

rules:
  - "Change command-line flags only"
  - "Do not install packages"
  - "INVALID is not LOSS"
